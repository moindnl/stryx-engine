<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="72%">
      <stop offset="0%"  stop-color="#252530"/>
      <stop offset="100%" stop-color="#0f0f14"/>
    </radialGradient>
    <linearGradient id="arc-grad" x1="87" y1="354" x2="425" y2="61" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#c02010"/>
      <stop offset="55%"  stop-color="#f73b20"/>
      <stop offset="100%" stop-color="#fb6040"/>
    </linearGradient>
    <filter id="glow-arc" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="face-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Dim track — full 240° arc -->
  <path d="M 87 354 A 195 195 0 1 1 425 354"
    fill="none" stroke="rgba(247,59,32,0.18)" stroke-width="18" stroke-linecap="round"/>

  <!-- Active arc — 75% filled, Jeton Red -->
  <path d="M 87 354 A 195 195 0 1 1 425 159"
    fill="none" stroke="url(#arc-grad)" stroke-width="18" stroke-linecap="round"
    filter="url(#glow-arc)"/>

  <!-- Face -->
  <circle cx="256" cy="252" r="92" fill="#ffffff" filter="url(#face-shadow)"/>

  <!-- Left eye × (center 218,239) -->
  <path d="M205,226 L231,252 M205,252 L231,226"
    stroke="#111111" stroke-width="11" stroke-linecap="round"/>

  <!-- Right eye × (center 294,239) -->
  <path d="M281,226 L307,252 M281,252 L307,226"
    stroke="#111111" stroke-width="11" stroke-linecap="round"/>

  <!-- Mouth — small open oval -->
  <ellipse cx="256" cy="287" rx="18" ry="12" fill="#111111"/>
</svg>
